services:
  # Static Site Service for Vikram Studio Website
  - type: web
    name: vikram-studio-website
    env: static
    buildCommand: "echo 'Static site - no build needed'"
    staticPublishPath: .
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-XSS-Protection
        value: "1; mode=block"
      - path: /*.*
        name: Cache-Control
        value: "public, max-age=31536000"
    routes:
      - type: rewrite
        source: /*
        destination: /vikram-studio-website.html
