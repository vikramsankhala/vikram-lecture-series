name: Auto Commit Changes

on:
  push:
    branches:
      - main      # or master, adjust to your default branch
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      # Change remote to target repository
      - name: Point origin to CDD repo
        run: |
          git remote set-url origin https://github.tools.sap/ecs-cae-dm-ai-org/CDD.git

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: auto-commit changes"

